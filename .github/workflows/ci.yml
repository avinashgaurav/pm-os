name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-node${{ matrix.node }}-next-

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (warn only)
        run: npm run lint || echo "::warning::Lint reported issues — see job log. Not failing CI yet (see issue #6)."
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  size:
    name: bundle size diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Compare bundle size
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: 'npm ci'
          build-script: 'build'
          pattern: '.next/static/**/*.{js,css}'
          exclude: '{**/*.map,**/node_modules/**}'
          minimum-change-threshold: 100
