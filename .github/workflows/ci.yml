name: CI

on:
  pull_request:
  push:
    branches: [main]

# Only cancel in-flight PR runs. Never cancel main-branch runs —
# back-to-back merges must each be fully verified.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # .next/cache is Next.js's incremental build cache. Keying only on
      # the lockfile means we reuse it across any PR with the same deps;
      # Next.js handles invalidation of stale entries internally.
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-next-

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # Only runs on PRs. Gated on build success so we don't size-diff a broken build.
  size:
    name: bundle size diff
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pinned to a SHA, not @v2, because this third-party action holds
      # pull-requests: write. Bump deliberately when a new release is reviewed.
      # Currently tracks preactjs/compressed-size-action v2 HEAD (2026-05-24).
      - name: Compare bundle size
        uses: preactjs/compressed-size-action@66325aad6443cb7cf89c4bfcd414aea2367cda94
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: 'npm ci'
          build-script: 'build'
          pattern: '.next/static/**/*.{js,css}'
          exclude: '{**/*.map,**/node_modules/**}'
          # Threshold in BYTES — show only diffs >= 100 B
          minimum-change-threshold: 100
