name: Prompt eval

# Nightly snapshot check + manual dispatch. Skips gracefully if no provider
# secret is set (e.g. on a fork PR that has no access to repo secrets) so the
# workflow doesn't go red for the wrong reason.

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC nightly
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/lib/ai-prompts.ts'
      - 'evals/fixtures/**'
      - 'scripts/eval-prompts.ts'
      - 'src/lib/providers/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Check provider secret
        id: secret_check
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ] && \
             [ -z "${{ secrets.OPENAI_API_KEY }}" ] && \
             [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && \
             [ -z "${{ secrets.GOOGLE_API_KEY }}" ] && \
             [ -z "${{ secrets.OLLAMA_URL }}" ]; then
            echo "No provider secret set — skipping eval"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run snapshot check
        if: steps.secret_check.outputs.skipped != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
        run: npm run eval:check
