version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      next:
        patterns:
          - next
          - eslint-config-next
      typescript:
        patterns:
          - typescript
          - '@typescript-eslint/*'
      lint-and-format:
        patterns:
          - eslint
          - eslint-*
          - prettier
          - prettier-*
          - husky
          - lint-staged
      types:
        patterns:
          - '@types/*'
    ignore:
      # Lock major upgrades behind a manual sweep — Next + Dexie majors usually
      # carry breaking changes.
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: dexie
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(actions)
      include: scope
